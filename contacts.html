<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Контактна інформація та форма зворотного зв'язку.">
    <meta property="og:title" content="Контакти - Генератор паролів">
    <meta property="og:description" content="Зв'яжіться з нами для пропозицій та питань.">
    <title>Контакти</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Генератор паролів</h1>
        <nav>
            <ul>
                <li><a href="catalog.html">Що таке генератор паролів?</a></li>
                <li><a href="index.html">Згенерувати пароль</a></li>
                <li><a href="contacts.html" class="active">Контакти</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Зв'яжіться з нами</h2>
            <p>Якщо у вас виникли питання щодо роботи генератора паролів або пропозиції щодо покращення, заповніть форму нижче.</p>
            
            <form action="#" method="POST">
                <fieldset>
                    <legend>Форма зворотного зв'язку</legend>
                    
                    <div class="form-group">
                        <label for="user-name">Ім'я:</label>
                        <input type="text" id="user-name" name="name" required placeholder="Введіть ваше ім'я">
                    </div>
                    
                    <div class="form-group">
                        <label for="user-email">Email:</label>
                        <input type="email" id="user-email" name="email" required placeholder="example@gmail.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="user-phone">Телефон (+380...):</label>
                        <input type="tel" id="user-phone" name="phone" pattern="^\+380\d{9}$" required title="Введіть номер у форматі +380XXXXXXXXX" placeholder="+380...">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Повідомлення:</label>
                        <textarea id="message" name="message" rows="4" required placeholder="Напишіть ваше повідомлення тут..."></textarea>
                    </div>
                    
                    <button type="submit">Відправити</button>
                </fieldset>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Усі права захищені.</p>
    </footer>
</body>
</html>
